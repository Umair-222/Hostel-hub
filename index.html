
<!DOCTYPE html>
<html>
<head>
  <title>Hostel App</title>

  <!-- Mobile App Style -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#007BFF">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f0f2f5;
    }

    header {
      background: #007BFF;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      padding: 10px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 12px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin: 5px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background: #007BFF;
      color: white;
      border: none;
      font-weight: bold;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      border-top: 1px solid #ccc;
    }

    .bottom-nav button {
      flex: 1;
      background: none;
      color: #333;
      border: none;
      padding: 10px;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<header>📱 Hostel App</header>

<!-- LOGIN -->
<div class="container" id="loginBox">
  <div class="card">
    <h3>Login</h3>
    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<!-- MAIN -->
<div id="app" class="hidden">

  <div class="container" id="home">
    <div class="card">
      <h3>Welcome</h3>
      <p>Login successful ✅</p>
    </div>
  </div>

  <div class="container hidden" id="dues">
    <div class="card">
      <h3>💰 Dues</h3>
      <p>Ali: 5000 (Dena)</p>
      <p>Usman: 3000 (Lena)</p>
    </div>
  </div>

  <div class="container hidden" id="food">
    <div class="card">
      <h3>🍛 Food</h3>
      <p>Monday: Chicken Rice</p>
    </div>
  </div>

  <div class="container hidden" id="bills">
    <div class="card">
      <h3>⚡ Bills</h3>
      <p>Electricity: 15000</p>
    </div>
  </div>

</div>

<!-- NAV -->
<div class="bottom-nav hidden" id="nav">
  <button onclick="show('home')">Home</button>
  <button onclick="show('dues')">Dues</button>
  <button onclick="show('food')">Food</button>
  <button onclick="show('bills')">Bills</button>
</div>

<script>
const USER = "admin";
const PASS = "1234";

function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pass").value;

  if (u === USER && p === PASS) {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("app").classList.remove("hidden");
    document.getElementById("nav").classList.remove("hidden");
  } else {
    alert("Wrong login");
  }
}

function show(section) {
  ["home","dues","food","bills"].forEach(id=>{
    document.getElementById(id).classList.add("hidden");
  });
  document.getElementById(section).classList.remove("hidden");
}
</script>

</body>
</html>
